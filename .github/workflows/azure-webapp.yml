name: build-test-publish-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  SOLUTION_FILE: EvfDemoApi.sln
  API_PROJECT: EvfDemoApi.Api/EvfDemoApi.Api.csproj
  TEST_PROJECT: EvfDemoApi.Tests/EvfDemoApi.Tests.csproj

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $SOLUTION_FILE

      - name: Build
        run: dotnet build $SOLUTION_FILE --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test
        run: dotnet test $TEST_PROJECT --configuration $BUILD_CONFIGURATION --no-build --logger trx

      - name: Publish API
        run: dotnet publish $API_PROJECT --configuration $BUILD_CONFIGURATION --no-build --output ${{ github.workspace }}/artifacts/publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: ${{ github.workspace }}/artifacts/publish

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test-publish
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: published-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: published-app
